<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DevOps Lead Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; backdrop-filter: blur(10px); }
        .glow { box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">Azure DevOps Command Center</h1>
                <p class="text-slate-400">Target: Team Lead Architectural Assessment</p>
            </div>
            <div class="text-right">
                <span class="bg-sky-900 text-sky-300 px-3 py-1 rounded text-sm">Status: ACTIVE</span>
            </div>
        </header>

        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <section class="card p-6 rounded-xl mb-6 glow">
                <h2 class="text-xl font-bold mb-4 text-sky-400">Module 01: Security & Networking</h2>
                <label class="block mb-2">תאר את ה-Blast Radius של ה-Flat Network הנוכחי:</label>
                <textarea name="sec_risk" class="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white" rows="3"></textarea>
            </section>

            <section class="card p-6 rounded-xl mb-6">
                <h2 class="text-xl font-bold mb-4 text-sky-400">Module 02: Infrastructure Proficiency</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <p class="mb-2">איזה שירות מבצע ניתוב מרכזי ב-Hub-Spoke?</p>
                        <select name="mcq1" class="w-full bg-slate-900 p-3 rounded">
                            <option>Azure Firewall</option>
                            <option>NSG</option>
                            <option>VNet Peering</option>
                        </select>
                    </div>
                </div>
            </section>

            <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 transition-all py-4 rounded-xl font-bold text-xl tracking-widest uppercase">
                Deploy Assessment Results
            </button>
        </form>
    </div>
</body>
</html>
