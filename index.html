<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Assessment</title>

<style>
body { background:#0b0e14; color:white; font-family:Arial; padding:20px; }
.card { background:#111827; padding:15px; margin-bottom:15px; border-radius:10px; }
textarea { width:100%; height:80px; margin-top:10px; }
#timer { position:fixed; top:10px; right:10px; background:#1f2937; padding:10px; border-radius:8px; }
button { width:100%; padding:15px; background:#2563eb; color:white; border:0; }
</style>
</head>

<body>

<div id="timer">60:00</div>

<h1>DevOps Lead Test</h1>

<div class="card">
<h3>Networking</h3>
<p>Zero Trust design in Azure?</p>
<textarea></textarea>
</div>

<div class="card">
<h3>Terraform</h3>
<p>State management risks?</p>
<textarea></textarea>
</div>

<div class="card">
<h3>AKS</h3>
<p>CrashLoopBackOff troubleshooting?</p>
<textarea></textarea>
</div>

<div class="card">
<h3>Leadership</h3>
<p>Production urgent feature - what do you do?</p>
<textarea></textarea>
</div>

<button onclick="alert('Submitted')">Submit</button>

<script>
let time = 60*60;

setInterval(()=>{
 let m=Math.floor(time/60);
 let s=time%60;
 document.getElementById("timer").innerText =
 m+":"+(s<10?"0":"")+s;
 time--;
 if(time<0) alert("Time up");
},1000);
</script>

</body>
</html>
